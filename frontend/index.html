<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtGuard - Digital Evidence Verification</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>CourtGuard</h1>
    <p>AI-Based Digital Evidence Verification System</p>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="image">Image</button>
      <button class="tab-btn" data-tab="video">Video</button>
      <button class="tab-btn" data-tab="audio">Audio</button>
      <button class="tab-btn" data-tab="history">History</button>
    </nav>

    <section id="image" class="tab-panel active">
      <h2>Analyze Image</h2>
      <input type="file" id="image-input" accept="image/*" />
      <div class="btn-row">
        <button onclick="analyzeImage()">Analyze</button>
        <button class="secondary" onclick="clearTab('image')">Clear</button>
      </div>
    </section>

    <section id="video" class="tab-panel">
      <h2>Analyze Video</h2>
      <input type="file" id="video-input" accept="video/*" />
      <div class="btn-row">
        <button onclick="analyzeVideo()">Analyze</button>
        <button class="secondary" onclick="clearTab('video')">Clear</button>
      </div>
    </section>

    <section id="audio" class="tab-panel">
      <h2>Analyze Audio</h2>
      <input type="file" id="audio-input" accept="audio/*" />
      <div class="btn-row">
        <button onclick="analyzeAudio()">Analyze</button>
        <button class="secondary" onclick="clearTab('audio')">Clear</button>
      </div>
    </section>

    <section id="history" class="tab-panel">
      <h2>Audit Trail — Past Analyses</h2>
      <button onclick="loadHistory()">Refresh</button>
      <div id="history-list"></div>
    </section>

    <section id="loading-box" class="hidden">
      <div class="spinner"></div>
      <p>Analyzing evidence...</p>
    </section>

    <section id="result-box" class="hidden">
      <h2>Result</h2>
      <div class="meter-wrap">
        <div id="score-meter" class="meter">
          <div class="meter-value" id="meter-value">0%</div>
        </div>
        <div id="verdict-label" class="verdict-label"></div>
      </div>
      <details>
        <summary>Raw details</summary>
        <pre id="result-content"></pre>
      </details>
      <div class="btn-row">
        <button onclick="downloadReport()">Download PDF Report</button>
        <button class="secondary" onclick="clearResult()">Clear Result</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
